<div class="jh-dialog-backdrop" (click)="close.emit()">
  <div class="jh-dialog-panel" (click)="$event.stopPropagation()">
    <h3 class="text-xl font-semibold text-amber-950">Create Item</h3>
    <p class="mt-1 text-sm text-stone-600">Fill the information below and save.</p>

    <div class="mt-4 grid grid-cols-1 gap-3 sm:grid-cols-2">
      <input [(ngModel)]="model.name" class="jh-dialog-input" placeholder="Name" />
      <div class="jh-select-wrap">
        <select [(ngModel)]="model.metalType" class="jh-select jh-dialog-input w-full">
          <option value="" disabled>Metal type</option>
          @for (m of metals; track m.id) {
            <option [value]="m.name">{{ m.name }}</option>
          }
        </select>
      </div>
      <input [(ngModel)]="model.weight" type="number" class="jh-dialog-input" placeholder="Weight" />
      <input [(ngModel)]="model.makingCharges" type="number" class="jh-dialog-input" placeholder="Making Charges" />
      <div class="jh-select-wrap">
        <select [(ngModel)]="model.availability" class="jh-select jh-dialog-input w-full">
          @for (option of availabilityOptions; track option) {
            <option [value]="option">{{ option }}</option>
          }
        </select>
      </div>
      <div class="sm:col-span-2 rounded-xl border border-amber-200/90 bg-amber-50/50 p-4">
        <div class="mb-3 flex items-center justify-between gap-3">
          <span class="text-xs font-semibold uppercase tracking-wide text-amber-900">Taxes</span>
          <button type="button" (click)="addTaxRow()" class="rounded-lg border border-amber-300 bg-white px-3 py-1.5 text-xs font-semibold text-amber-900 shadow-sm hover:bg-amber-50">
            + Add tax
          </button>
        </div>
        @if (!model.taxes.length) {
          <p class="text-xs leading-relaxed text-stone-500">No taxes yet. Add a row for each tax (name and rate 0–100%).</p>
        }
        <div class="space-y-3">
          @for (row of model.taxes; track row; let i = $index) {
            <div class="grid grid-cols-1 items-center gap-2 rounded-lg border border-amber-200/70 bg-white/90 p-3 shadow-sm sm:grid-cols-[minmax(0,1fr)_7.5rem_auto] sm:gap-3">
              <input
                [(ngModel)]="row.taxName"
                [name]="'createTaxName' + i"
                class="jh-dialog-input h-10 w-full min-w-0"
                placeholder="Tax name"
              />
              <div class="flex h-10 min-w-0 items-stretch overflow-hidden rounded-xl border border-amber-300 bg-white focus-within:border-yellow-600 focus-within:ring-1 focus-within:ring-yellow-600/40">
                <input
                  [(ngModel)]="row.taxPercentage"
                  [name]="'createTaxPct' + i"
                  type="number"
                  min="0"
                  max="100"
                  step="0.01"
                  class="min-w-0 flex-1 border-0 bg-transparent px-3 py-2 text-sm text-stone-800 outline-none tabular-nums placeholder:text-stone-400"
                  placeholder="0"
                />
                <span class="flex select-none items-center border-l border-amber-200 bg-amber-50/90 px-2.5 text-sm font-semibold text-amber-900">%</span>
              </div>
              <button
                type="button"
                (click)="removeTaxRow(i)"
                class="h-10 shrink-0 rounded-lg border border-red-200 bg-white px-3 text-xs font-semibold text-red-700 hover:bg-red-50 sm:justify-self-end"
                aria-label="Remove tax"
              >
                Remove
              </button>
            </div>
          }
        </div>
      </div>
      <div class="sm:col-span-2">
        <label class="mb-1 block text-xs font-medium text-stone-600">Item Image</label>
        <input type="file" accept="image/*" (change)="onImageChange($event)" class="jh-dialog-input w-full file:mr-3 file:rounded-md file:border-0 file:bg-amber-100 file:px-3 file:py-1 file:text-xs file:font-semibold file:text-amber-900" />
      </div>
    </div>

    <div class="mt-6 flex justify-end gap-2">
      <button (click)="close.emit()" class="rounded-lg border border-amber-300 px-4 py-2 text-sm font-medium text-amber-900">Cancel</button>
      <button (click)="onSave()" class="rounded-lg bg-gradient-to-r from-amber-800 to-yellow-700 px-4 py-2 text-sm font-semibold text-white">Save</button>
    </div>
  </div>
</div>
