<main (window:scroll)="onWindowScroll()" class="min-h-screen bg-[radial-gradient(circle_at_top,_#fff7d6_0%,_#fef3c7_35%,_#fde68a_100%)] text-stone-900">
  <header class="jh-header-wrap" [class.jh-header-wrap--scrolled]="isScrolled">
    <div class="jh-header-inner">
      <div>
        <h1 class="font-bold tracking-tight text-amber-50" [class.text-3xl]="!isScrolled" [class.text-2xl]="isScrolled">{{ appName }}</h1>
        <p class="hidden text-sm text-amber-100/90 transition-all duration-200 sm:block" [class.opacity-100]="!isScrolled" [class.opacity-0]="isScrolled" [class.h-5]="!isScrolled" [class.h-0]="isScrolled">
          Fine Jewellery E-Commerce Platform
        </p>
      </div>
      <nav class="flex gap-2 rounded-xl border border-amber-100/30 bg-white/10 p-1">
        <a
          routerLink="/"
          routerLinkActive="bg-white text-amber-900 shadow-sm"
          [routerLinkActiveOptions]="{ exact: true }"
          class="rounded-lg px-3.5 py-1.5 text-xs font-semibold text-amber-50 transition hover:bg-white/90 hover:text-amber-900 sm:text-sm"
        >
          Home
        </a>
        <a
          routerLink="/items"
          routerLinkActive="bg-white text-amber-900 shadow-sm"
          class="rounded-lg px-3.5 py-1.5 text-xs font-semibold text-amber-50 transition hover:bg-white/90 hover:text-amber-900 sm:text-sm"
        >
          Item Management
        </a>
      </nav>
    </div>
  </header>
  <div class="pt-32 sm:pt-36">
    <router-outlet />
  </div>
</main>
